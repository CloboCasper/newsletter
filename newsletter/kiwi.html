<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KIWI | Clobotics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="content">
      <header>
        <div class="logo-mark">C</div>
        <div>
          <p style="margin:0; color:#1d2f4d; font-weight:700; text-transform:uppercase; font-size:0.95rem;">KIWI</p>
          <h1 id="title">KIWI status</h1>
        </div>
      </header>

      <section>
        <h2>Current software version</h2>
        <p id="software_version">Loading...</p>

        <h2>KIWI ready for inspections job</h2>
        <p id="ready_for_inspections">Loading...</p>

        <p class="small-note" id="last_updated">Last updated: loading...</p>

        <h2>Manuals</h2>
        <ul id="manuals">
          <li>Loading...</li>
        </ul>
      </section>

      <section>
        <a class="button" href="index.html">Back to home</a>
      </section>

      <script>
        fetch('content_kiwi.json').then(response => {
          const lastModified = response.headers.get('last-modified');
          return response.json().then(d => ({ d, lastModified }));
        }).then(result => {
          document.getElementById('software_version').innerText = result.d.current_software_version || '';
          document.getElementById('ready_for_inspections').innerText = result.d.kiwi_ready_for_inspections_job || '';
          const ul = document.getElementById('manuals'); ul.innerHTML='';
          (result.d.manuals||[]).forEach(m=>{ const li = document.createElement('li'); li.innerText = m; ul.appendChild(li); });
          const updatedEl = document.getElementById('last_updated');
          const dateText = result.lastModified ? new Date(result.lastModified).toLocaleString('en-GB') : result.d.last_updated || '';
          updatedEl.innerText = dateText ? `Last updated: ${dateText}` : '';
        }).catch(() => {
          document.getElementById('last_updated').innerText = '';
        });
      </script>

      <footer>
        <p>Clobotics — KIWI</p>
      </footer>
    </div>
  </main>
</body>
</html>
